{% extends 'core/base.html' %}
{% block content %}
<div class="row justify-content-center mb-5">
    <div class="col-md-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold mb-0"><i class="fa-solid fa-plus-circle text-primary me-2"></i>Create New Order</h3>
            </div>
            <a href="{% url 'admin_dashboard' %}" class="btn btn-light rounded-pill px-4 shadow-sm border"><i
                    class="fa-solid fa-arrow-left me-2"></i>Back</a>
        </div>

        <div class="glass-card border-top border-4 border-primary">
            <form method="POST" onsubmit="return validateServices()">
                {% csrf_token %}

                <h5 class="fw-bold text-muted mb-3 border-bottom pb-2">Customer Information</h5>
                <div class="row g-3 mb-4 bg-light p-3 rounded">
                    <div class="col-md-6">
                        <label class="form-label fw-medium"><i class="fa-solid fa-phone fa-sm me-2 text-muted"></i>Phone
                            Number <span class="text-danger">*</span></label>
                        <input type="text" name="customer_phone" class="form-control bg-white"
                            placeholder="000-000-0000" pattern="[6789]\d{9}" title="Phone number must be exactly 10 digits and start with 6, 7, 8, or 9" minlength="10" maxlength="10" required>
                        <!-- <div class="form-text">Will auto-register an account if new.</div> -->
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-medium"><i
                                class="fa-solid fa-user fa-sm me-2 text-muted"></i>Customer Name</label>
                        <input type="text" name="customer_name" class="form-control bg-white"
                            placeholder="Optional Name">
                    </div>
                    <div class="col-12 mt-3 border-top pt-3">
                        <div class="form-check form-switch mb-2">
                            <input class="form-check-input" type="checkbox" id="is_home_delivery" name="is_home_delivery" onchange="toggleAddress()">
                            <label class="form-check-label fw-bold" for="is_home_delivery"><i class="fa-solid fa-truck text-muted me-2"></i>Request Home Delivery</label>
                        </div>
                        <div id="address_container" style="display: none;">
                            <label class="form-label fw-medium"><i class="fa-solid fa-location-dot fa-sm me-2 text-muted"></i>Delivery Address</label>
                            <textarea name="delivery_address" class="form-control bg-white" rows="2" placeholder="Enter full delivery address"></textarea>
                        </div>
                    </div>
                </div>

                <h5 class="fw-bold text-muted mb-3 border-bottom pb-2 mt-4">Select Laundry Services</h5>
                <div class="row g-3 mb-4">
                    {% for s in services %}
                    <div class="col-md-6 col-lg-4">
                        <div class="card h-100 border shadow-sm transition-hover">
                            <div class="card-body">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="service_ids"
                                        value="{{ s.id }}" id="s_{{ s.id }}">
                                    <label class="form-check-label fw-bold d-block" for="s_{{ s.id }}">
                                        {{ s.name }}
                                    </label>
                                    <span class="text-success fw-medium">&#8377;{{ s.price }}</span>
                                </div>
                                <div class="mt-3">
                                    <label class="form-label small text-muted mb-1">Quantity</label>
                                    <input type="number" name="quantities"
                                        class="form-control form-control-sm text-center fw-bold bg-light" value="1"
                                        min="1" required>
                                </div>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>

                <hr class="my-4">
                <button type="submit" class="btn btn-brand w-100 py-3 rounded-pill fs-5"><i
                        class="fa-solid fa-check-circle me-2"></i>Process Order Now</button>
            </form>
        </div>
    </div>
</div>

<script>
    function toggleAddress() {
        var checkbox = document.getElementById('is_home_delivery');
        var container = document.getElementById('address_container');
        var addressInput = document.querySelector('textarea[name="delivery_address"]');
        if (checkbox && container) {
            container.style.display = checkbox.checked ? 'block' : 'none';
            if (addressInput) {
                addressInput.required = checkbox.checked;
            }
        }
    }

    function validateServices() {
        var checkboxes = document.querySelectorAll('input[name="service_ids"]:checked');
        if (checkboxes.length === 0) {
            alert('Please select at least one laundry service.');
            return false;
        }
        return true;
    }
</script>
{% endblock %}
