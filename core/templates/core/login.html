{% extends 'core/base.html' %}
{% block content %}
<div class="auth-wrapper">
    <div class="glass-card auth-card text-center">
        <i class="fa-solid fa-circle-user auth-icon"></i>
        <h3 class="fw-bold mb-4">Welcome Back</h3>
        <p class="text-muted mb-4">Log in to manage your laundry orders.</p>

        <form method="POST" class="text-start">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-medium text-muted">Phone Number or Email</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i
                            class="fa-solid fa-envelope text-muted"></i></span>
                    <input type="text" name="identifier" class="form-control border-start-0 ps-0"
                        placeholder="Enter your credentials" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-medium text-muted">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i
                            class="fa-solid fa-lock text-muted"></i></span>
                    <input type="password" name="password" class="form-control border-start-0 ps-0"
                        placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-brand w-100 py-3 rounded-pill shadow-sm">Secure Login</button>
        </form>

        <div class="mt-4 pt-3 border-top">
            <p class="mb-0 text-muted">New to AquaWash? <a href="{% url 'register' %}"
                    class="fw-bold text-decoration-none" style="color: var(--brand-main);">Create an account</a></p>
        </div>
    </div>
</div>
{% endblock %}
